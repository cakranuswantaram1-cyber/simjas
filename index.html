<style>
@import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800;900&family=Noto+Sans:wght@400;500;700&display=swap');
:root{--a:#00e5a0;--a2:#00b8d4;--bg:#0d0d14;--card:#161622;--bd:#252535;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans',sans-serif;background:var(--bg);color:#e2e2f0;}
.hs{overflow-y:auto;}
.hs::-webkit-scrollbar{width:6px;height:6px;}
.hs::-webkit-scrollbar-track{background:transparent;}
.hs::-webkit-scrollbar-thumb{background:#333;border-radius:10px;}
.logo-hex{width:38px;height:38px;background:linear-gradient(135deg,#00e5a0,#00b8d4);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,229,160,0.4);flex-shrink:0;}
.logo-sm{width:30px;height:30px;}
.btn-p{background:linear-gradient(135deg,#00c87a,#00a8c4);color:#000;font-weight:700;border:none;cursor:pointer;transition:all .2s;font-family:'Exo 2',sans-serif;}
.btn-p:disabled{opacity:0.6;cursor:not-allowed;filter:grayscale(1);}
.btn-p:hover:not(:disabled){filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,229,160,0.3);}
.btn-d{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.3);cursor:pointer;transition:all .2s;}
.btn-d:hover{background:rgba(239,68,68,.2);}
.nav-a{background:linear-gradient(135deg,rgba(0,229,160,.1),rgba(0,184,212,.06));border:1px solid rgba(0,229,160,.3)!important;color:#00e5a0!important;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:#1a1a28;border:1px solid #303050;border-radius:16px;padding:24px;max-width:500px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.jadwal-cell{position:relative; transition: all 0.2s;}
.jadwal-cell:hover {background: rgba(0,229,160,.1) !important;}
.jadwal-cell .ca{position:absolute;top:2px;right:2px;opacity:0;transition:opacity .15s;display:flex;gap:2px;z-index:10;}
.jadwal-cell:hover .ca{opacity:1;}
.cbtn{width:20px;height:20px;border-radius:4px;border:none;cursor:pointer;font-size:8px;display:flex;align-items:center;justify-content:center;}
.cbtn-e{background:rgba(0,184,212,.85);color:#fff;}
.cbtn-d{background:rgba(220,60,60,.85);color:#fff;}
.cbtn-l{background:rgba(100,100,120,.7);color:#ddd;}
.cbtn-l-on{background:rgba(245,158,11,.9);color:#fff;}
.cell-locked{border-left:2px solid rgba(245,158,11,.5)!important;background:rgba(245,158,11,.05)!important;}
.lock-badge{position:absolute;top:2px;left:3px;color:#f59e0b;font-size:8px;z-index:5;pointer-events:none;line-height:1;}
.ain{animation:ain .25s ease forwards;}
@keyframes ain{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.swap-mode-active .jadwal-cell{cursor:crosshair!important;}
.cell-swap-a{outline:2px solid #00b8d4!important;background:rgba(0,184,212,.18)!important;}
.cell-swap-a .mn{color:#00b8d4!important;}
@keyframes swappulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.cell-swap-a{animation:swappulse 1.4s ease-in-out infinite;}

/* PDF Print Styling */
.print-header {display:none;}
@media print{
  @page { size: landscape; margin: 10mm; }
  body, #root, .hs, #print-area {background:#fff!important; color:#000!important; -webkit-print-color-adjust:exact!important; print-color-adjust:exact!important; overflow:visible!important; height:auto!important;}
  .no-print, .modal-bg, #sidebar-spacer {display:none!important;}
  #print-area {display:block!important; padding: 0 !important; width:100%;}
  .print-header {display:block!important; text-align:center; padding:10px 0; border-bottom:3px solid #000; margin-bottom:15px;}
  .print-header h1 {font-size:24px; font-weight:900; color:#000!important; text-transform:uppercase; letter-spacing:1px; margin-bottom:2px;}
  .print-header h2 {font-size:14px; font-weight:700; color:#333!important; margin-bottom:2px;}
  .print-header p {font-size:11px; color:#555!important;}
  .class-wrap {page-break-inside:avoid; page-break-after:always; margin-bottom:0!important; background:#fff!important; border:none!important; width:100%;}
  .class-wrap:last-child {page-break-after:auto;}
  .class-title {background:#fff!important; color:#000!important; border:none!important; border-bottom:2px solid #000!important; padding:6px 0!important; margin-bottom: 8px; display:flex; justify-content:space-between; align-items:flex-end;}
  .class-title span {color:#000!important; font-size: 16px!important;}
  table {width:100%; border-collapse:collapse; margin-bottom:10px; border:2px solid #000!important; table-layout: fixed;}
  th, td {border:1px solid #000!important; padding:4px!important; font-size:11px!important; overflow: hidden; word-wrap: break-word;}
  .th-day {background:#f0f0f0!important; color:#000!important; font-weight:900!important; text-align:center;}
  .td-time {background:#f9f9f9!important; color:#000!important; font-weight:700!important; text-align:center; white-space:nowrap; width: 60px;}
  .td-off {background:#eee!important; color:#555!important; text-align:center;}
  .td-upacara {background:#ffe0e0!important; color:#900!important; text-align:center; font-weight:800!important;}
  .td-mapel {background:#e0fff4!important; text-align:center; vertical-align: middle;}
  .td-mapel .mn {color:#000!important; font-weight:900!important; font-size:12px!important; display:block; margin-bottom:2px;}
  .td-mapel .gn {color:#333!important; font-size:10px!important; display:block;}
  .td-empty {background:#fff!important;}
}
/* SK Print Override */
@media print{
  #sk-print-area { display:block!important; background:#fff!important; color:#000!important; font-family:'Times New Roman',Times,serif!important; padding:18mm 20mm!important; box-shadow:none!important; border-radius:0!important; max-width:100%!important; }
  #sk-print-area * { color:#000!important; background:transparent!important; box-shadow:none!important; }
  #sk-print-area table { border-collapse:collapse!important; width:100%!important; }
  #sk-print-area th { background:#f0f0f0!important; color:#000!important; border:1px solid #000!important; padding:6px 8px!important; font-size:11pt!important; }
  #sk-print-area td { border:1px solid #000!important; padding:5px 8px!important; font-size:11pt!important; color:#000!important; }
  #sk-print-area tr:nth-child(even) td { background:#fafafa!important; }
  .sk-no-print { display:none!important; }
  .no-print { display:none!important; }
  #sidebar-spacer { display:none!important; }
}
