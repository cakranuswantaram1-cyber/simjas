<script type="text/babel">
const {useState,useEffect,useCallback,memo,useRef,useMemo} = React;

const HARI = ['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu','Minggu'];
const JP_MAX = 10; 
const KLASS_COLORS = [
  'from-emerald-500/20 to-teal-500/20 border-emerald-500/40 text-emerald-300',
  'from-blue-500/20 to-cyan-500/20 border-blue-500/40 text-blue-300',

const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem('sj3_'+k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem('sj3_'+k,JSON.stringify(v));}catch{}},
};

// ATURAN JP KETAT V7 (Prioritas 3 JP)
const makeChunks = (jp) => {
  if (jp <= 1) return []; 
  if (jp === 2) return [2];
  if (jp === 3) return [3]; 
  if (jp === 4) return [2, 2];
  if (jp === 5) return [3, 2]; 
  if (jp === 6) return [3, 3];
  if (jp === 7) return [3, 2, 2];
  if (jp === 8) return [3, 3, 2];
  if (jp === 9) return [3, 3, 3];
  if (jp === 10) return [3, 3, 2, 2];
  
  const ch = [];
  let r = jp;
  while (r > 0) {
      if (r >= 3) { ch.push(3); r -= 3; }
      else if (r === 2) { ch.push(2); r -= 2; }
      else if (r === 1) {
          if (ch.length > 0 && ch[ch.length - 1] < 3) { ch[ch.length - 1] += 1; r = 0; }
          else { ch.push(2); r = 0; } 
      }
  }
  return ch;
};

const calcTime=(k,jp)=>{
  if(!k?.jamMasuk) return '';
  let [h,m]=k.jamMasuk.split(':').map(Number), tot=h*60+m;
  for(let i=1;i<jp;i++){
    tot+=parseInt(k.durasiJp||35);
    if(i===parseInt(k.jpIstirahat||4) || i===(parseInt(k.jpIstirahat||4)+3)) { 
        tot+=parseInt(k.durasiIstirahat||15);
    }
  }
  const f=n=>`${String(Math.floor(n/60)%24).padStart(2,'0')}:${String(n%60).padStart(2,'0')}`;
  return `${f(tot)}–${f(tot+parseInt(k.durasiJp||35))}`;
};

// --- KOMPONEN VALIDASI REALTIME ---
const validateJadwal = (kelas, HARI, JP_MAX, slotConfig, jadwal, assignments, lockedSlots) => {
    let reports = [];
    let isAllValid = true;

    kelas.forEach(k => {
        let classValid = true;
        let errors = [];
        let mapelCounts = {};
        
        HARI.forEach(h => {
            let consecutiveMapel = null;
            let consecCount = 0;

            for(let j=1; j<=JP_MAX; j++) {
                if(slotConfig?.[k.id]?.[h]?.[j]) {
                    const ass = jadwal?.[k.id]?.[h]?.[j];
                    if(!ass) {
                        errors.push(`Slot Kosong: ${h} JP ${j}`);
                        classValid = false;
                    } else if (!ass.isUpacara) {
                        mapelCounts[ass.mapelId] = (mapelCounts[ass.mapelId] || 0) + 1;
                        if (ass.mapelId === consecutiveMapel) {
                            consecCount++;
                            if (consecCount > 4) { errors.push(`Pelanggaran beruntun: Mapel lebih dari 4 JP di hari ${h}`); classValid = false; }
                        } else {
                            consecutiveMapel = ass.mapelId;
                            consecCount = 1;
                        }
                    }
                }
            }
        });

        const classAssignments = assignments.filter(a => a.kelasId === k.id);
        classAssignments.forEach(ca => {
            const placed = mapelCounts[ca.mapelId] || 0;
            if (placed < ca.jp) {
                errors.push(`Kurang JP: Mapel baru terpasang ${placed} dari ${ca.jp} JP.`);
                classValid = false;
            } else if (placed > ca.jp) {
                errors.push(`Kelebihan JP: Mapel terpasang ${placed} (Target: ${ca.jp} JP).`);
                classValid = false;
            }
        });

        reports.push({ kId: k.id, nama: k.nama, valid: classValid, errors });
        if(!classValid) isAllValid = false;
    });

    let teacherConflicts = [];
    HARI.forEach(h => {
        for(let j=1; j<=JP_MAX; j++) {
            let teacherMap = {};
            kelas.forEach(k => {
                const ass = jadwal?.[k.id]?.[h]?.[j];
                if(ass && !ass.isUpacara && ass.guruId) {
                    if(teacherMap[ass.guruId]) {
                        teacherConflicts.push(`Guru bentrok: Mengajar di ${teacherMap[ass.guruId]} & ${k.nama} pada ${h} JP ${j}`);
                        isAllValid = false;
                        let c1 = reports.find(r => r.nama === teacherMap[ass.guruId]);
                        let c2 = reports.find(r => r.kId === k.id);
                        if(c1) { c1.valid = false; c1.errors.push(`Guru bentrok di hari ${h} JP ${j}`); }
                        if(c2) { c2.valid = false; c2.errors.push(`Guru bentrok di hari ${h} JP ${j}`); }
                    } else {
                        teacherMap[ass.guruId] = k.nama;
                    }
                }
            });
        }
    });

    return { isAllValid, reports, teacherConflicts };
};

const ValidationPanel = ({ validationData, onGoToKelas }) => {

    const filtered = validationData.reports.filter(r => {

                <div style={{display:'flex', gap:8}}>
                    <button onClick={()=>setFilter('semua')} style={{background:filter==='semua'?'rgba(0,184,212,.2)':'#0d0d14', color:filter==='semua'?'#00b8d4':'#aaa', border:'1px solid #333', padding:'4px 10px', borderRadius:6, fontSize:11, fontWeight:700}}>Semua ({validationData.reports.length})</button>
                    <button onClick={()=>setFilter('valid')} style={{background:filter==='valid'?'rgba(0,229,160,.2)':'#0d0d14', color:filter==='valid'?'#00e5a0':'#aaa', border:'1px solid #333', padding:'4px 10px', borderRadius:6, fontSize:11, fontWeight:700}}>Valid ({vCount})</button>
                    <button onClick={()=>setFilter('invalid')} style={{background:filter==='invalid'?'rgba(239,68,68,.2)':'#0d0d14', color:filter==='invalid'?'#f87171':'#aaa', border:'1px solid #333', padding:'4px 10px', borderRadius:6, fontSize:11, fontWeight:700}}>Bermasalah ({iCount})</button>
                </div>
            </div>

            {validationData.teacherConflicts.length > 0 && (
                <div style={{background:'rgba(239,68,68,.1)', border:'1px solid rgba(239,68,68,.3)', borderRadius:8, padding:10, marginBottom:12}}>
                    <p style={{fontSize:12, color:'#fca5a5', fontWeight:700, marginBottom:4}}><i className="fas fa-exclamation-triangle"/> BENTROK GURU TERDETEKSI</p>
                    <ul style={{fontSize:11, color:'#f87171', paddingLeft:16, listStyle:'disc'}}>
                        {validationData.teacherConflicts.slice(0,5).map((err,i) => <li key={i}>{err}</li>)}
                        {validationData.teacherConflicts.length > 5 && <li>...dan {validationData.teacherConflicts.length - 5} lainnya</li>}
                    </ul>
                </div>
            )}

            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(200px, 1fr))', gap:10}}>
                {filtered.map(r => (
                    <div key={r.kId} style={{background:'#0d0d14', border:`1px solid ${r.valid ? 'rgba(0,229,160,.3)' : 'rgba(239,68,68,.3)'}`, borderRadius:8, padding:12, cursor: !r.valid && onGoToKelas ? 'pointer' : 'default', transition:'border-color .15s'}}
                      onClick={()=>{ if(!r.valid && onGoToKelas) onGoToKelas(r.kId); }}
                      onMouseEnter={e=>{ if(!r.valid && onGoToKelas) e.currentTarget.style.borderColor='rgba(0,184,212,.6)'; }}
                      onMouseLeave={e=>{ if(!r.valid && onGoToKelas) e.currentTarget.style.borderColor='rgba(239,68,68,.3)'; }}
                    >
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4}}>
                            <strong style={{fontSize:12, color:'#fff'}}>{r.nama}</strong>
                            {r.valid ? 
                                <span style={{fontSize:10, color:'#00e5a0', background:'rgba(0,229,160,.1)', padding:'2px 6px', borderRadius:4, fontWeight:700, flexShrink:0}}>✅ VALID</span> : 
                                <span style={{fontSize:10, color:'#f87171', background:'rgba(239,68,68,.1)', padding:'2px 6px', borderRadius:4, fontWeight:700, flexShrink:0}}>❌ ERROR</span>
                            }
                        </div>
                        {!r.valid && (
                            <>
                              <ul style={{fontSize:10, color:'#fca5a5', marginTop:6, paddingLeft:14, listStyle:'disc'}}>
                                  {r.errors.slice(0,3).map((e,i) => <li key={i} style={{marginBottom:2}}>{e}</li>)}
                                  {r.errors.length > 3 && <li style={{color:'#555'}}>...+{r.errors.length - 3} lainnya</li>}
                              </ul>
                              {onGoToKelas && <p style={{fontSize:9,color:'#00b8d4',marginTop:6,fontWeight:700}}><i className="fas fa-arrow-right" style={{marginRight:3}}/>Klik untuk perbaiki jadwal kelas ini</p>}
                            </>
                        )}
                    </div>
                ))}
            </div>
        </div>
    );
};

const Dashboard = memo(({akademik,guru,kelas,mapel,assignments,isGenerated,setTab})=>{
  const handleExport = () => {
    const dt = {};
    for(let i=0; i<localStorage.length; i++) {
        const key = localStorage.key(i);
        if(key.startsWith('sj3_')) dt[key.replace('sj3_','')] = JSON.parse(localStorage.getItem(key));
    }
    const blob = new Blob([JSON.stringify(dt,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; 
    a.download=`SIMJAS_Backup_${akademik.tahunAjaran.replace('/','-')}_${new Date().toISOString().slice(0,10)}.json`; 
    a.click();
  };

  const handleImport = (e) => {
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = (evt) => {
      try {
          const d = JSON.parse(evt.target.result);
          if(confirm('Timpa semua data saat ini dengan file backup yang diunggah?')){
            localStorage.clear();

const TugasMengajar = memo(({kelas,guru,mapel,assignments,setAssignments})=>{
  const [mode,setMode]=useState('manual');
  const [fGuru,setFGuru]=useState(guru[0]?.id||'');
  const [fMapel,setFMapel]=useState(mapel[0]?.id||'');
  const [fJp,setFJp]=useState(2); 
  const [fBlok,setFBlok]=useState(false);
  const [fPagi,setFPagi]=useState(false);
  const [selKls,setSelKls]=useState({});
  const [editId,setEditId]=useState(null);
  const [srcKls,setSrcKls]=useState(kelas[0]?.id||'');
  const [dstKls,setDstKls]=useState({});
  const [tplMap,setTplMap]=useState({});
  const [filterKls,setFilterKls]=useState('semua');

  const gName=id=>guru.find(g=>g.id===id)?.nama||'—';
  const mName=id=>mapel.find(m=>m.id===id)?.nama||'—';

  const startEdit=a=>{
    setMode('manual');setFGuru(a.guruId);setFMapel(a.mapelId);setFJp(a.jp);
    setFBlok(a.isBlock);setFPagi(a.isPagi);setSelKls({[a.kelasId]:true});setEditId(a.id);
  };
  const cancelEdit=()=>{setEditId(null);setSelKls({});};
  
  const simpan=()=>{
    if(!fGuru||!fMapel){alert('Pilih Guru dan Pelajaran!');return;}
    const tgts=Object.keys(selKls).filter(k=>selKls[k]);
    if(!tgts.length){alert('Centang minimal 1 kelas!');return;}
    const jpInput = parseInt(fJp)||2;
    if(jpInput < 2) { alert('PERINGATAN: Sesuai ketentuan operasional, Minimal harus 2 JP untuk mencegah slot pecahan 1 JP tersisa. Harap naikkan jumlah JP.'); return; }

    const base={guruId:fGuru,mapelId:fMapel,jp:jpInput,isBlock:fBlok,isPagi:fPagi};
    
    if(editId){
      if(tgts.length>1){alert('Mode edit: pilih 1 kelas saja.');return;}
      if(assignments.find(a => a.kelasId===tgts[0] && a.mapelId===fMapel && a.id!==editId)) {
          alert(`Pelajaran sudah terdaftar di kelas ini. Duplikasi dilarang.`); return;
      }
      setAssignments(p=>p.map(a=>a.id===editId?{...a,...base,kelasId:tgts[0]}:a));
      setEditId(null);setSelKls({});alert('Tugas diperbarui!');
    }else{
      let dups = [];
      tgts.forEach(t => { if(assignments.find(a => a.kelasId===t && a.mapelId===fMapel)) dups.push(kelas.find(k=>k.id===t)?.nama); });
      if(dups.length > 0) {
          alert(`GAGAL DISIMPAN: Pelajaran sudah terdaftar di kelas:\n- ${dups.join('\n- ')}\nData yang sama dilarang.`); return;
      }
      setAssignments(p=>[...p,...tgts.map(t=>({...base,id:'A'+Math.random(),kelasId:t}))]);
      setSelKls({});alert(`Tugas ditambahkan ke ${tgts.length} kelas!`);
    }
  };
  
  const salinTpl=()=>{
    const src=assignments.filter(a=>a.kelasId===srcKls);
    const tgts=Object.keys(dstKls).filter(k=>dstKls[k]);
    if(!src.length||!tgts.length){alert('Pilih sumber dan target!');return;}
    let na=[], skipDups = 0;
    tgts.forEach(t=>{
      src.forEach(tc=>{
        const exist = assignments.find(a => a.kelasId===t && a.mapelId===tc.mapelId) || na.find(a => a.kelasId===t && a.mapelId===tc.mapelId);
        if(!exist) {
            na.push({...tc,id:'A'+Math.random(),kelasId:t,guruId:tplMap[tc.id]||tc.guruId});
        } else { skipDups++; }
      });
    });
    setAssignments(p=>[...p,...na]);setDstKls({});setTplMap({});
    alert(`Berhasil disalin: ${na.length} tugas.\nDilewati karena sudah ada: ${skipDups} tugas.`);
  };

  const list=filterKls==='semua'?assignments:assignments.filter(a=>a.kelasId===filterKls);
  const tabBtn=(id,label)=>(
    <button key={id} onClick={()=>setMode(id)} style={mode===id?{background:'linear-gradient(135deg,#00c87a,#00a8c4)',color:'#000',border:'none',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'Exo 2'}:{background:'#161622',color:'#888',border:'1px solid #252535',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:600,cursor:'pointer'}}>
      {label}
    </button>
  );
  const selStyle=on=>({cursor:'pointer',borderRadius:8,padding:'8px 10px',border:`1px solid ${on?'rgba(0,229,160,.4)':'#252535'}`,background:on?'rgba(0,229,160,.1)':'#0d0d14',color:on?'#00e5a0':'#666',fontSize:11,fontWeight:700,textAlign:'center',transition:'all .15s'});
  const inp2={background:'#0d0d14',border:'1px solid #333',borderRadius:8,padding:'9px 12px',fontSize:12,color:'#fff',outline:'none',width:'100%'};

  return(
    <div className="ain" style={{display:'flex',flexDirection:'column',height:'100%',gap:12}}>
      <div style={{display:'flex',flexWrap:'wrap',gap:6,alignItems:'center',flexShrink:0}}>
        {tabBtn('manual','✏️ Input Manual')}
        {tabBtn('template','📋 Salin Template')}
        {tabBtn('daftar',`📄 Daftar (${assignments.length})`)}
        {editId&&<button onClick={cancelEdit} className="btn-d" style={{borderRadius:8,padding:'7px 12px',fontSize:12,fontWeight:700}}>✕ Batal Edit</button>}
      </div>

      <div className="hs" style={{flex:1,background:'#161622',border:'1px solid #252535',borderRadius:12,padding:20}}>
        {mode==='manual'&&(
          <div style={{maxWidth:700}}>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:14,marginBottom:16}}>
              <div>
                <label style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:2,display:'block',marginBottom:6}}>GURU PENGAJAR</label>
                <select value={fGuru} onChange={e=>setFGuru(e.target.value)} style={inp2}>{guru.map(g=><option key={g.id} value={g.id}>{g.nama}</option>)}</select>
              </div>
              <div>
                <label style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:2,display:'block',marginBottom:6}}>MATA PELAJARAN</label>
                <select value={fMapel} onChange={e=>setFMapel(e.target.value)} style={inp2}>{mapel.map(m=><option key={m.id} value={m.id}>{m.nama}</option>)}</select>
              </div>
              <div>
                <label style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:2,display:'block',marginBottom:6}}>JP PER MINGGU</label>
                <input type="number" min="2" max="24" value={fJp} onChange={e=>setFJp(e.target.value)} style={inp2}/>
              </div>
            </div>
            <div style={{display:'flex',gap:10,marginBottom:16}}>
              {[{v:fBlok,s:setFBlok,l:'Satu Blok (Berurutan)',d:'Dilarang keras sistem memecah JP ini'},{v:fPagi,s:setFPagi,l:'Khusus Pagi (JP 1–4)',d:'Wajib diutamakan awal jam (cth: Olahraga)'}].map(o=>(
                <label key={o.l} style={{flex:1,display:'flex',alignItems:'center',gap:10,cursor:'pointer',background:'#0d0d14',border:'1px solid #252535',borderRadius:8,padding:'10px 12px'}}>
                  <input type="checkbox" checked={o.v} onChange={e=>o.s(e.target.checked)} style={{width:14,height:14,accentColor:'#00e5a0'}}/>
                  <div><span style={{fontSize:12,color:'#fff',fontWeight:700,display:'block'}}>{o.l}</span><span style={{fontSize:10,color:'#555'}}>{o.d}</span></div>
                </label>
              ))}
            </div>
            <label style={{fontSize:11,color:'#fff',fontWeight:700,display:'block',marginBottom:10,fontFamily:'Exo 2'}}>KELAS TUJUAN</label>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(100px,1fr))',gap:6,marginBottom:16}}>
              {kelas.map(k=>(
                <div key={k.id} onClick={()=>setSelKls(p=>({...p,[k.id]:!p[k.id]}))} style={selStyle(selKls[k.id])}>
                  {selKls[k.id]&&'✓ '}{k.nama}

            </div>
            <button onClick={simpan} className="btn-p" style={{width:'100%',padding:'13px',borderRadius:10,fontSize:13,fontFamily:'Exo 2',letterSpacing:1}}>
              <i className={editId?"fas fa-save":"fas fa-plus"} style={{marginRight:8}}/>{editId?'PERBARUI TUGAS':'SIMPAN TUGAS BARU'}
            </button>
          </div>
        )}
        {mode==='template'&&(
          <div style={{maxWidth:680}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              <div>
                <label style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:2,display:'block',marginBottom:6}}>1. KELAS SUMBER</label>
                <select value={srcKls} onChange={e=>setSrcKls(e.target.value)} style={{...inp2,marginBottom:14,fontWeight:700}}>{kelas.map(k=><option key={k.id} value={k.id}>{k.nama}</option>)}</select>

// ENGINE GENERATE BARU V7 (Absolute Constraints & Smart Block Preservation)
const AutoGenerate = memo(({akademik,kelas,guru,mapel,assignments,slotConfig,guruOffDays,setJadwal,setIsGenerated,setTab,lockedSlots,jadwal,history,setHistory})=>{
  const [log,setLog]=useState(''); const [status,setStatus]=useState('idle'); const [progress,setProgress]=useState(0);
  const [genMode, setGenMode] = useState('semua');
  const [genTarget, setGenTarget] = useState([]); 
  const [genGuruKelas, setGenGuruKelas] = useState([]);
  
  const mName=id=>mapel.find(m=>m.id===id)?.nama||id; const kName=id=>kelas.find(k=>k.id===id)?.nama||id;

  const runGenerator=async()=>{
    if(!akademik.tahunAjaran) { alert("Harap lengkapi TAHUN AJARAN!"); setTab('akademik'); return; }
    if(genMode !== 'semua' && genTarget.length === 0) { alert("Pilih minimal satu target generate (centang kotak yang tersedia)!"); return; }
    
    setStatus('processing'); setLog('Inisialisasi Algoritma V7 (Hard Lock Upacara & Pengecekan Blok Utuh)...'); setProgress(5);
    await new Promise(r=>setTimeout(r,50)); 
    
    let nj_base = (genMode === 'semua') ? {} : JSON.parse(JSON.stringify(jadwal || {})); 
    let gt_base = {};

    // 1. Setup Grid Dasar & Kunci Jadwal
    kelas.forEach(k=>{
      if(genMode === 'semua' || !nj_base[k.id]) nj_base[k.id] = {};
      HARI.forEach(h=>{
        if(genMode === 'semua' || !nj_base[k.id][h]) nj_base[k.id][h] = {};
        if(!gt_base[h]) gt_base[h]={};
        
        for(let jp=1;jp<=JP_MAX;jp++){
          let isLocked = lockedSlots?.[k.id]?.[h]?.[jp];
          let shouldClear = false;
          
          if (genMode === 'semua') shouldClear = true;
          if (genMode === 'kelas' && genTarget.includes(k.id)) shouldClear = true;
          if (genMode === 'guru' && genTarget.includes(nj_base[k.id]?.[h]?.[jp]?.guruId)) shouldClear = true;

          // Jangan hapus yang dilock manual
          if (isLocked) shouldClear = false;

          // FORCE UPACARA (Kunci Paten Global Senin JP 1, tak terhapus apa pun)
          if (h === 'Senin' && jp === 1 && slotConfig?.[k.id]?.['Senin']?.[1]) {
             nj_base[k.id]['Senin'][1] = {isUpacara:true, mapelId:'UPC'};
             shouldClear = false;
          }

          if (shouldClear) nj_base[k.id][h][jp] = null;
          if (!gt_base[h][jp]) gt_base[h][jp]={};
          
          const existCell = nj_base[k.id]?.[h]?.[jp];
          if(existCell && existCell.guruId) gt_base[h][jp][existCell.guruId] = true;
        }
      });
    });

    setLog('Memproses Pengelompokan (Chunks) & Aturan Satu Blok...'); setProgress(20);
    await new Promise(r=>setTimeout(r,50));
    
    let chunksToPlace = [];
    let guruClasses = {};
    let assMap = {};
    assignments.forEach(a => { 
        if(!guruClasses[a.guruId]) guruClasses[a.guruId] = new Set(); 
        guruClasses[a.guruId].add(a.kelasId);
        assMap[a.id] = a.jp;
    });
    
    let targetAssignments = assignments.filter(ass => {
        if(genMode === 'semua') return true;
        if(genMode === 'kelas') return genTarget.includes(ass.kelasId);
        if(genMode === 'guru') return genTarget.includes(ass.guruId) && (genGuruKelas.length === 0 || genGuruKelas.includes(ass.kelasId));
        return false;
    });

    targetAssignments.forEach(ass => {
        let lockedJp = 0;
        HARI.forEach(h => { for(let j=1; j<=JP_MAX; j++) if(nj_base[ass.kelasId]?.[h]?.[j]?.mapelId === ass.mapelId) lockedJp++; });
        
        let rem = ass.jp - lockedJp;
        if(rem > 0) {
            let isUmum = guruClasses[ass.guruId].size > 1; 
            // FIX: Jika isBlock dicentang, WAJIB biarkan utuh [rem], jangan pernah dipecah!
            let cLengths = ass.isBlock ? [rem] : makeChunks(rem);
            cLengths.forEach(len => {
                chunksToPlace.push({ id: ass.id, kId: ass.kelasId, mapelId: ass.mapelId, guruId: ass.guruId, len: len, isUmum: isUmum, isPagi: ass.isPagi, isBlock: ass.isBlock });
            });
        }
    });

    // PENGURUTAN BOBOT PRIORITAS
    chunksToPlace.sort((a,b) => {
        if(a.isPagi !== b.isPagi) return a.isPagi ? -1 : 1; 
        let totalA = assMap[a.id] || 0;
        let totalB = assMap[b.id] || 0;
        if(totalA !== totalB) return totalB - totalA; 
        if(a.isUmum !== b.isUmum) return a.isUmum ? -1 : 1; 
        return b.len - a.len;
    });

    setLog('Mengeksekusi Backtracking Loop & Simulasi Resolusi Bentrok...'); setProgress(40);
    await new Promise(r=>setTimeout(r,50));

    let bestNj = null;
    let minErrors = Infinity;
    let bestErrors = [];
    const maxIterations = 50; 
    
    for (let iter = 0; iter < maxIterations; iter++) {
        let nj_sim = JSON.parse(JSON.stringify(nj_base));
        let gt_sim = JSON.parse(JSON.stringify(gt_base));
        let errors_sim = [];
        
        let iterChunks = [...chunksToPlace];
        if (iter > 0) {
            // Shuffle
            for (let i = iterChunks.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                if (iterChunks[i].isPagi === iterChunks[j].isPagi && iterChunks[i].len === iterChunks[j].len) {
                    [iterChunks[i], iterChunks[j]] = [iterChunks[j], iterChunks[i]];
                }
            }
        }

        for (let i = 0; i < iterChunks.length; i++) {
            let chunk = iterChunks[i];
            let bestH = null, bestS = null, bestScore = Infinity;
            let days = [...HARI].sort(() => Math.random() - 0.5); 
            
            for (let h of days) {
                if (guruOffDays[chunk.guruId]?.[h]) continue;
                let hasSameMapel = false;
                for (let j=1; j<=JP_MAX; j++) if (nj_sim[chunk.kId][h][j] && nj_sim[chunk.kId][h][j].mapelId === chunk.mapelId) hasSameMapel = true;

                let maxPagi = (h === 'Senin') ? 5 : 4; 

                for (let s=1; s<=JP_MAX - chunk.len + 1; s++) {
                    if (chunk.isPagi && (s + chunk.len - 1 > maxPagi)) continue;
                    
                    let valid = true;
                    for (let c=0; c<chunk.len; c++) {
                        if (!slotConfig?.[chunk.kId]?.[h]?.[s+c]) { valid = false; break; }
                        if (nj_sim[chunk.kId][h][s+c] !== null) { valid = false; break; }
                        if (gt_sim[h][s+c][chunk.guruId]) { valid = false; break; }
                    }
                    
                    if (valid) {
                        let score = 0;
                        if (hasSameMapel) score += 5000; 
                        if (!chunk.isPagi && !chunk.isUmum) score += (s * 10);
                        
                        let prevEmpty = (s > 1) && slotConfig?.[chunk.kId]?.[h]?.[s-1] && !nj_sim[chunk.kId][h][s-1];
                        let prevPrevEmpty = (s > 2) && slotConfig?.[chunk.kId]?.[h]?.[s-2] && !nj_sim[chunk.kId][h][s-2];
                        if (prevEmpty && !prevPrevEmpty) score += 10000;

                        let nextEmpty = (s + chunk.len <= JP_MAX) && slotConfig?.[chunk.kId]?.[h]?.[s+chunk.len] && !nj_sim[chunk.kId][h][s+chunk.len];
                        let nextNextEmpty = (s + chunk.len + 1 <= JP_MAX) && slotConfig?.[chunk.kId]?.[h]?.[s+chunk.len+1] && !nj_sim[chunk.kId][h][s+chunk.len+1];
                        if (nextEmpty && !nextNextEmpty) score += 10000;

                        if (score < bestScore) { bestScore = score; bestH = h; bestS = s; }
                    }
                }
            }

            if (bestH) {
                for(let c=0; c<chunk.len; c++) {
                    nj_sim[chunk.kId][bestH][bestS+c] = {id: chunk.id, mapelId: chunk.mapelId, guruId: chunk.guruId};
                    gt_sim[bestH][bestS+c][chunk.guruId] = true;
                }
            } else {
                errors_sim.push(`Bentrok Data: Blok utuh ${chunk.len} JP ${mName(chunk.mapelId)} di ${kName(chunk.kId)} gagal ditempatkan.`);
            }
        }
        
        if (errors_sim.length < minErrors) {
            minErrors = errors_sim.length;
            bestErrors = errors_sim;
            bestNj = nj_sim;
            if (minErrors === 0) break; 
        }
        
        if (iter % 10 === 0) {
            setProgress(40 + Math.floor((iter/maxIterations)*50));
            await new Promise(r=>setTimeout(r,5));
        }
    }

    setLog('Finalisasi Validasi Integritas...'); setProgress(95);
    await new Promise(r=>setTimeout(r,150));

    setProgress(100); setJadwal(bestNj); setIsGenerated(true);
    
    const historyEntry = {
        id: 'H'+Date.now(),
        name: `Jadwal AI (${genMode}) - ${new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}`,
        time: new Date().toLocaleTimeString('id-ID'),
        data: bestNj
    };
    setHistory(prev => [historyEntry, ...prev].slice(0, 5));

    setStatus('done');
    setLog(bestErrors.length>0 ? '⚠️ Generate Selesai (dengan sedikit Kendala/Bentrok). Hasil terbaik:\n\n- '+bestErrors.join('\n- ') : '✅ Sempurna! Seluruh jadwal berhasil disusun (aturan blok dipatuhi).');
  };

  const inpSel={background:'#0d0d14',border:'1px solid #333',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#fff',outline:'none',width:'100%',fontFamily:'Exo 2',marginBottom:16};

  return(
    <div className="ain" style={{maxWidth:650,margin:'32px auto',textAlign:'center',background:'#161622',border:'1px solid #252535',borderRadius:24,padding:36}}>
      <div className="logo-hex" style={{width:60,height:60,margin:'0 auto 20px',boxShadow:'0 0 36px rgba(0,229,160,.3)'}}><i className="fas fa-robot" style={{color:'#000',fontSize:24}}/></div>
      <h2 style={{fontFamily:'Exo 2',fontWeight:900,fontSize:22,color:'#fff',marginBottom:8}}>AI SCHEDULER V7</h2>
      <p style={{fontSize:12,color:'#555',marginBottom:20,lineHeight:1.7}}>Mengunci Upacara Senin secara absolut, menjamin keutuhan JP untuk setingan "Satu Blok", dan perlindungan sinkronisasi antara Jadwal Kelas dan Guru.</p>

      {status!=='processing' && (
          <div style={{textAlign:'left'}}>
              <label style={{fontSize:10,color:'#00e5a0',fontWeight:700,letterSpacing:2,display:'block',marginBottom:6}}>TARGET GENERATE (Mendukung Multi-Pilihan)</label>
              <div style={{display:'flex',gap:10, alignItems:'flex-start', flexWrap:'wrap'}}>
                <div style={{flex:'1 1 200px'}}>
                  <select value={genMode} onChange={e=>{setGenMode(e.target.value); setGenTarget([]);}} style={{...inpSel, marginBottom:0}}>
                      <option value="semua">Semua Jadwal (Reset Total)</option>
                      <option value="kelas">Pilih Beberapa Kelas</option>
                      <option value="guru">Pilih Beberapa Guru</option>
