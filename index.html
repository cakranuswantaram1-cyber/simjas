                {genMode === 'kelas' && (
                    <div className="hs" style={{flex:'2 1 250px', background:'#0d0d14', border:'1px solid #333', borderRadius:8, padding:'10px', maxHeight:160, display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(110px, 1fr))', gap:8}}>
                        {kelas.map(k => (
                            <label key={k.id} style={{fontSize:11, color:'#fff', display:'flex', alignItems:'center', gap:6, cursor:'pointer', wordBreak:'break-word'}}>
                                <input type="checkbox" checked={genTarget.includes(k.id)} onChange={e=>{
                                    if(e.target.checked) setGenTarget(p=>[...p, k.id]);
                                    else setGenTarget(p=>p.filter(x=>x!==k.id));
                                }} style={{accentColor:'#00e5a0', flexShrink:0, width:14, height:14}}/>
                                <span>{k.nama}</span>
                            </label>
                        ))}
                    </div>
                )}
                
                {genMode === 'guru' && (
                    <div className="hs" style={{flex:'2 1 250px', background:'#0d0d14', border:'1px solid #333', borderRadius:8, padding:'10px', maxHeight:160, display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(130px, 1fr))', gap:8}}>
                        {guru.map(g => (
                            <label key={g.id} style={{fontSize:11, color:'#fff', display:'flex', alignItems:'center', gap:6, cursor:'pointer', wordBreak:'break-word', whiteSpace:'normal'}}>
                                <input type="checkbox" checked={genTarget.includes(g.id)} onChange={e=>{
                                    if(e.target.checked) setGenTarget(p=>[...p, g.id]);
                                    else setGenTarget(p=>p.filter(x=>x!==g.id));
                                }} style={{accentColor:'#00e5a0', flexShrink:0, width:14, height:14}}/>
                                <span>{g.nama}</span>
                            </label>
                        ))}
                    </div>
                )}
              </div>
              
              {genMode === 'guru' && genTarget.length > 0 && (
                <div style={{marginTop:12, background:'#0d0d14', border:'1px dashed rgba(0,229,160,.3)', borderRadius:8, padding:'10px'}}>
                  <label style={{fontSize:10, color:'#00e5a0', fontWeight:700, letterSpacing:1, display:'block', marginBottom:8}}>
                    <i className="fas fa-filter" style={{marginRight:5}}/>FILTER KELAS (Opsional — kosong = semua kelas guru tersebut)
                  </label>
                  <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(120px, 1fr))', gap:6}}>
                    {kelas.filter(k => assignments.some(a => genTarget.includes(a.guruId) && a.kelasId === k.id)).map(k => (
                      <label key={k.id} style={{fontSize:11, color:'#ccc', display:'flex', alignItems:'center', gap:6, cursor:'pointer', background:'#161622', padding:'6px 8px', borderRadius:6, border:`1px solid ${genGuruKelas.includes(k.id)?'rgba(0,229,160,.4)':'#252535'}`, wordBreak:'break-word'}}>
                        <input type="checkbox" checked={genGuruKelas.includes(k.id)} onChange={e=>{
                          if(e.target.checked) setGenGuruKelas(p=>[...p, k.id]);
                          else setGenGuruKelas(p=>p.filter(x=>x!==k.id));
                        }} style={{accentColor:'#00e5a0', flexShrink:0, width:13, height:13}}/>
                        <span style={{color:genGuruKelas.includes(k.id)?'#00e5a0':'#ccc', fontWeight:genGuruKelas.includes(k.id)?700:400}}>{k.nama}</span>
                      </label>
                    ))}
                  </div>
                  {genGuruKelas.length > 0 && <p style={{fontSize:10,color:'#fbbf24',marginTop:6}}><i className="fas fa-info-circle" style={{marginRight:4}}/>Generate hanya untuk {genGuruKelas.length} kelas yang dipilih.</p>}
                </div>
              )}
          </div>
      )}

      {status==='processing' && (
          <div style={{marginBottom:20, marginTop:20}}>
            <div style={{width:'100%',height:8,background:'#0d0d14',borderRadius:4,overflow:'hidden'}}><div style={{width:`${progress}%`,height:'100%',background:'linear-gradient(90deg,#00e5a0,#00b8d4)',transition:'width .3s'}}/></div>
            <p style={{fontSize:11,color:'#00e5a0',marginTop:8,fontWeight:700,animation:'pulse 1.5s infinite'}}>{log}</p>
          </div>
      )}

      <button onClick={runGenerator} disabled={status==='processing'} className="btn-p" style={{width:'100%',padding:'15px',borderRadius:12,fontSize:14,fontFamily:'Exo 2',letterSpacing:2, marginTop: 24}}>
        <i className={status==='processing'?"fas fa-circle-notch fa-spin":"fas fa-bolt"} style={{marginRight:8}}/>
        {status==='processing'?'MENYUSUN JADWAL...':'GENERATE JADWAL SEKARANG'}
      </button>

      {status==='done' && (
        <div style={{marginTop:16,textAlign:'left',padding:'12px 14px',borderRadius:10,fontSize:11,lineHeight:1.7,whiteSpace:'pre-line',border:'1px solid',background:log.includes('⚠️')?'rgba(245,158,11,.07)':'rgba(0,229,160,.07)',borderColor:log.includes('⚠️')?'rgba(245,158,11,.25)':'rgba(0,229,160,.25)',color:log.includes('⚠️')?'#fbbf24':'#6ee7b7'}}>
          {log}
        </div>
      )}

      {history.length > 0 && status!=='processing' && (
          <div style={{marginTop:24,textAlign:'left'}}>
              <p style={{fontSize:12,color:'#aaa',fontWeight:700,marginBottom:10,fontFamily:'Exo 2'}}>RIWAYAT GENERATE SEBELUMNYA</p>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {history.map((h, i) => (
                      <div key={h.id} style={{background:'#0d0d14',border:'1px solid #333',borderRadius:8,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                          <div>
                              <p style={{fontSize:12,color:'#fff',fontWeight:700}}>{h.name}</p>
                          </div>
                          <button onClick={()=>{
                              if(confirm(`Ganti jadwal aktif ke ${h.name}?`)){
                                  setJadwal(h.data); setTab('grid');
                              }
                          }} className="btn-p" style={{padding:'6px 12px',borderRadius:6,fontSize:10}}>Tampilkan</button>
                      </div>
                  ))}
              </div>
          </div>
      )}
    </div>
  );
});

// HASIL & CETAK
const GridJadwal = memo(({akademik,kelas,guru,mapel,jadwal,assignments,slotConfig,isGenerated,setJadwal,lockedSlots,setLockedSlots})=>{
  const [viewMode,setViewMode]=useState('semua_kelas');
  const [selId,setSelId]=useState(kelas[0]?.id||'');
  const [editCell,setEditCell]=useState(null);
  const [editData,setEditData]=useState({mapelId:'',guruId:'', selectedKelas:'', durasi:1});
  const [lockMode,setLockMode]=useState(false);
  const [showResetModal,setShowResetModal]=useState(false);
  const [showLockGuruModal,setShowLockGuruModal]=useState(false);
  const [lockGuruTarget,setLockGuruTarget]=useState('');
  const [resetMode,setResetMode]=useState('unlocked');
  const [resetTarget,setResetTarget]=useState([]);

  const gName=id=>guru.find(g=>g.id===id)?.nama||'—'; const mName=id=>mapel.find(m=>m.id===id)?.nama||'—'; const kName=id=>kelas.find(k=>k.id===id)?.nama||'—';

  const validationData = useMemo(() => validateJadwal(kelas, HARI, JP_MAX, slotConfig, jadwal, assignments, lockedSlots), [kelas, slotConfig, jadwal, assignments, lockedSlots]);

  const openEdit=(kId,hari,jp, prelockGuruId = null)=>{
    if(jadwal[kId]?.[hari]?.[jp]?.isUpacara) return; // Upacara tidak boleh diedit
    const cur=jadwal[kId]?.[hari]?.[jp];
    setEditData({mapelId:cur?.mapelId||'',guruId: cur?.guruId || prelockGuruId || '', selectedKelas: kId || '', durasi:1});
    setEditCell({kId,hari,jp, isGuruView: !!prelockGuruId});
  };

  const handleMapelChange = (newMapelId) => {
      const kId = editCell.isGuruView ? editData.selectedKelas : editCell.kId;
      let matchingAss = assignments.find(a => a.kelasId === kId && a.mapelId === newMapelId);
      setEditData(prev => ({...prev, mapelId: newMapelId, guruId: matchingAss ? matchingAss.guruId : prev.guruId, durasi: 1}));
  };

  const saveEdit=()=>{
    if(!editCell) return; 
    setJadwal(prev=>{
      const nj=JSON.parse(JSON.stringify(prev));
      const kId = editCell.isGuruView ? editData.selectedKelas : editCell.kId;
      if(!nj[kId]) nj[kId]={}; if(!nj[kId][editCell.hari]) nj[kId][editCell.hari]={};
      
      if(editData.mapelId) {
          for(let d=0; d<editData.durasi; d++) {
              let targetJp = editCell.jp + d;
              if (targetJp <= JP_MAX) {
                  nj[kId][editCell.hari][targetJp] = {id:'m'+Date.now()+d, mapelId:editData.mapelId, guruId:editData.guruId};
              }
          }
      } else {
          nj[kId][editCell.hari][editCell.jp] = null;
          setLockedSlots(plock=>{const n=JSON.parse(JSON.stringify(plock||{}));if(n[kId]?.[editCell.hari])n[kId][editCell.hari][editCell.jp]=false;return n;});
      }
      return nj;
    });
    setEditCell(null);
  };

  const delCell=(kId,hari,jp)=>{
    if(jadwal[kId]?.[hari]?.[jp]?.isUpacara) { alert('Slot Upacara dipatenkan dan tidak dapat dihapus.'); return; }
    if(!confirm('Hapus isi jam ini?')) return;
    setJadwal(prev=>{const nj=JSON.parse(JSON.stringify(prev));nj[kId][hari][jp]=null;return nj;});
  };

  const lockGuruSlots=(guruId)=>{
    if(!guruId){alert('Pilih guru terlebih dahulu!');return;}
    const gNama=guru.find(g=>g.id===guruId)?.nama||guruId;
    if(!confirm(`Kunci SEMUA slot milik ${gNama}? Slot terkunci tidak akan berubah saat generate.`)) return;
    setLockedSlots(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      kelas.forEach(k=>{
        HARI.forEach(h=>{
          for(let j=1;j<=JP_MAX;j++){
            const cell=jadwal[k.id]?.[h]?.[j];
            if(cell&&cell.guruId===guruId&&!cell.isUpacara){
              if(!n[k.id])n[k.id]={};
              if(!n[k.id][h])n[k.id][h]={};
              n[k.id][h][j]=true;
            }
          }
        });
      });
      return n;
    });
    alert(`Semua slot ${gNama} berhasil dikunci!`);
    setShowLockGuruModal(false);
  };

  const unlockGuruSlots=(guruId)=>{
    if(!guruId) return;
    setLockedSlots(prev=>{
      const n=JSON.parse(JSON.stringify(prev||{}));
      kelas.forEach(k=>{
        HARI.forEach(h=>{
          for(let j=1;j<=JP_MAX;j++){
            const cell=jadwal[k.id]?.[h]?.[j];
            if(cell&&cell.guruId===guruId){
              if(n[k.id]?.[h]) n[k.id][h][j]=false;
            }
          }
        });
      });
      return n;
    });
  };

  const doResetJadwal=()=>{
    const modeLabel = {all:'SEMUA jadwal (termasuk terkunci)',unlocked:'jadwal TIDAK TERKUNCI saja',guru:'jadwal guru terpilih',kelas:'jadwal kelas terpilih'};
    if(!confirm(`Hapus ${modeLabel[resetMode]}? Tindakan ini TIDAK BISA dibatalkan.`)) return;
    setJadwal(prev=>{
      const nj=JSON.parse(JSON.stringify(prev||{}));
      kelas.forEach(k=>{
        HARI.forEach(h=>{
          for(let j=1;j<=JP_MAX;j++){
            const cell=nj[k.id]?.[h]?.[j];
            if(!cell) return;
            const isLocked=!!(lockedSlots?.[k.id]?.[h]?.[j]);
            let shouldDel=false;
            if(resetMode==='all') shouldDel=true;
            else if(resetMode==='unlocked'&&!isLocked) shouldDel=true;
            else if(resetMode==='guru'&&resetTarget.includes(cell.guruId)&&!cell.isUpacara) shouldDel=!isLocked||resetMode==='all';
            else if(resetMode==='kelas'&&resetTarget.includes(k.id)) shouldDel=!isLocked||resetMode==='all';
            
            // JANGAN PERNAH HAPUS UPACARA
            if(cell.isUpacara) shouldDel = false; 

            if(shouldDel) nj[k.id][h][j]=null;
          }
        });
      });
      return nj;
    });
    if(resetMode==='all') setLockedSlots({});
    alert('Jadwal berhasil dihapus sesuai pilihan!');
    setShowResetModal(false);
    setResetTarget([]);
  };

  const getRemainingMapel = (kId) => {
      if(!kId) return [];
      const kAssignments = assignments.filter(a => a.kelasId === kId);
      const relevantAssignments = editCell?.isGuruView ? kAssignments.filter(a => a.guruId === editData.guruId) : kAssignments;
      return relevantAssignments.map(ass => {
          let placed = 0;
          HARI.forEach(h => {
              for(let j=1; j<=JP_MAX; j++) {
                  if(jadwal[kId]?.[h]?.[j]?.mapelId === ass.mapelId) placed++;
              }
          });
          return {...ass, remaining: ass.jp - placed};
      }).filter(ass => ass.remaining > 0 || editData.mapelId === ass.mapelId);
  };

  const getAvailableConsecutive = () => {
    if(!editCell) return 0;
    const kId = editCell.isGuruView ? editData.selectedKelas : editCell.kId;
    if(!kId) return 0;
    let count = 0;
    for(let j = editCell.jp; j <= JP_MAX; j++) {
      if(!slotConfig?.[kId]?.[editCell.hari]?.[j]) break;
      const cell = jadwal[kId]?.[editCell.hari]?.[j];
      const isCurrentSlot = (j === editCell.jp);
      // Stop jika ada cell yg bukan upacara tapi sudah terisi (meskipun kita tidak boleh nabrak upacara)
      if(cell && !isCurrentSlot) break; 
      count++;
    }
    return count;
  };

  const doExcel=()=>{
    if(typeof XLSX === 'undefined') { alert("Pustaka SheetJS belum dimuat. Periksa koneksi internet Anda."); return; }
    if(!isGenerated) { alert("Jadwal belum digenerate."); return; }

    const wb = XLSX.utils.book_new();
    kelas.forEach(k => {
        let ws_data = [
            [`JADWAL PELAJARAN ${k.nama.toUpperCase()}`],
            [`${akademik.namaSekolah} | TA: ${akademik.tahunAjaran} | SMT: ${akademik.semester}`],
            [],
            ['Hari', 'JP', 'Waktu', 'Mata Pelajaran', 'Nama Guru']
        ];
        HARI.forEach(h => {
            for(let jp=1; jp<=JP_MAX; jp++) {
                if(!slotConfig?.[k.id]?.[h]?.[jp]) continue; 
                let ass = jadwal[k.id]?.[h]?.[jp];
                let waktu = calcTime(k, jp);
                if(ass?.isUpacara) { ws_data.push([h, `JP ${jp}`, waktu, 'UPACARA BENDERA', '-']); } 
                else if(ass) { ws_data.push([h, `JP ${jp}`, waktu, mName(ass.mapelId), gName(ass.guruId)]); } 
                else { ws_data.push([h, `JP ${jp}`, waktu, 'KOSONG', '-']); }
            }
        });
        let ws = XLSX.utils.aoa_to_sheet(ws_data);
        ws['!cols'] = [{wch: 10}, {wch: 8}, {wch: 15}, {wch: 30}, {wch: 35}];
        let safeName = k.nama.substring(0,31).replace(/[\\/?*\[\]]/g, '_'); 
        XLSX.utils.book_append_sheet(wb, ws, safeName);
    });
    XLSX.writeFile(wb, `Jadwal_${akademik.tahunAjaran.replace('/','-')}_${new Date().getTime()}.xlsx`);
  };

  const renderTable=(id,type)=>{
    const kObj=kelas.find(k=>k.id===id);
    const judul=type==='kelas'?kName(id):`Jadwal Mengajar: ${gName(id)}`;
    
    let maxJpClass = 1;
    if(type==='kelas' && slotConfig?.[id]) {
        HARI.forEach(h => { for(let j=JP_MAX; j>=1; j--) if(slotConfig[id][h][j] && j > maxJpClass) maxJpClass = j; });
    } else if(type==='guru') {
        const guruKls = assignments.filter(a => a.guruId === id).map(a => a.kelasId);
        guruKls.forEach(kId => {
            if (slotConfig?.[kId]) {
                HARI.forEach(h => { for(let j=JP_MAX; j>=1; j--) if(slotConfig[kId][h][j] && j > maxJpClass) maxJpClass = j; });
            }
        });
        if (maxJpClass === 1) maxJpClass = 8; 
    }

    return(
      <div key={id} className="class-wrap" style={{marginBottom:36}}>
        <div className="print-header">
            <h1>{akademik.namaSekolah}</h1>
            <h2>TAHUN AJARAN {akademik.tahunAjaran} | SEMESTER {akademik.semester ? akademik.semester.toUpperCase() : '-'} | {judul.toUpperCase()}</h2>
        </div>
        <div className="class-title no-print" style={{background:'linear-gradient(135deg,#0f1f1a,#0f1525)',borderBottom:'2px solid rgba(0,229,160,.3)',borderTopLeftRadius:12,borderTopRightRadius:12,padding:'10px 16px',display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontFamily:'Exo 2',fontWeight:900,fontSize:14,color:'#fff',textTransform:'uppercase',letterSpacing:1}}>{judul}</span>
          {type==='kelas'&&kObj&&<span className="no-print" style={{fontSize:11,color:'#555',marginLeft:'auto'}}>{kObj.jamMasuk} WIB · {kObj.durasiJp} mnt/JP</span>}
        </div>
        <div style={{overflowX:'auto',border:'1px solid #252535',borderTop:'none',borderBottomLeftRadius:12,borderBottomRightRadius:12,background:'#161622'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth: type==='guru' ? 1100 : 780, tableLayout:'fixed'}}>
            <thead>
              <tr style={{background:'#0d0d14'}}>
                <th className="th-day" style={{padding:'8px 6px',width:70,borderRight:'1px solid #252535',borderBottom:'1px solid #252535',fontSize:11,color:'#666',fontWeight:700,textAlign:'center'}}>JP</th>
                {HARI.map(h=><th key={h} className="th-day" style={{padding:'8px 4px',borderRight:'1px solid #252535',borderBottom:'1px solid #252535',fontSize:12,color:'#888',fontWeight:700,textAlign:'center',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h}</th>)}
              </tr>
            </thead>
            <tbody>
              {Array.from({length: maxJpClass}).map((_, i)=>(
                <tr key={i+1} style={{borderBottom:'1px solid #1e1e2e'}}>
                  <td className="td-time" style={{padding:'6px 4px',textAlign:'center',background:'#111118',borderRight:'1px solid #252535'}}>
                    <div style={{fontSize:12,fontWeight:700,color:'#aaa'}}>JP {i+1}</div>
                    {type==='kelas'&&<div style={{fontSize:9,color:'#555',marginTop:2}}>{calcTime(kObj,i+1)}</div>}
                  </td>
                  {HARI.map(hari=>{
                    if(type==='kelas'){
                      const off=!slotConfig?.[id]?.[hari]?.[i+1];
                      const ass=jadwal[id]?.[hari]?.[i+1];
                      const isLockedCell=!!(lockedSlots?.[id]?.[hari]?.[i+1]);
                      const cs={borderRight:'1px solid #1e1e2e',padding:8,verticalAlign:'middle',position:'relative'};
                      
                      if(off) return<td key={hari} className="td-off" style={{...cs,background:'#0a0a10',textAlign:'center',color:'#333',fontSize:12}}>—</td>;
                      if(ass?.isUpacara) return<td key={hari} className="td-upacara" style={{...cs,background:'rgba(239,68,68,.08)',textAlign:'center'}}><span style={{fontSize:11,fontWeight:900,color:'#f87171',letterSpacing:1,fontFamily:'Exo 2'}}>UPACARA</span></td>;
                      if(!ass) return(
                        <td key={hari} className="td-empty jadwal-cell" style={{...cs,background:'#0f0f16',cursor:'pointer'}} onClick={()=>!lockMode&&openEdit(id,hari,i+1)}>
                          <div className="ca no-print"><button className="cbtn cbtn-e"><i className="fas fa-plus" style={{fontSize:10}}/></button></div>
                        </td>
                      );
                      return(
                        <td key={hari} className={`td-mapel jadwal-cell${isLockedCell?' cell-locked':''}`} style={{...cs,background:isLockedCell?'rgba(245,158,11,.06)':'rgba(0,229,160,.03)'}} onClick={()=>!lockMode&&openEdit(id,hari,i+1)}>
                          {isLockedCell&&<span className="lock-badge no-print"><i className="fas fa-lock"/></span>}
                          <span className="mn" style={{display:'block',fontSize:13,fontWeight:700,color:isLockedCell?'#fcd34d':'#00e5a0',fontFamily:'Exo 2',marginBottom:3}}>{mName(ass.mapelId)}</span>
                          <span className="gn" style={{display:'block',fontSize:10,color:'#777'}}>{gName(ass.guruId)}</span>
                          <div className="ca no-print">
                            {lockMode?(
                              <button className={`cbtn ${isLockedCell?'cbtn-l-on':'cbtn-l'}`} onClick={e=>{e.stopPropagation();setLockedSlots(p=>{let n=JSON.parse(JSON.stringify(p)); if(!n[id]) n[id]={}; if(!n[id][hari]) n[id][hari]={}; n[id][hari][i+1]=!n[id][hari][i+1]; return n;})}}>
                                <i className={`fas ${isLockedCell?'fa-unlock':'fa-lock'}`}/>
                              </button>
                            ):(
                              <>
                                <button className="cbtn cbtn-e" onClick={e=>{e.stopPropagation();openEdit(id,hari,i+1);}}><i className="fas fa-pen"/></button>
                                <button className="cbtn cbtn-d" onClick={e=>{e.stopPropagation();delCell(id,hari,i+1);}}><i className="fas fa-times"/></button>
                              </>
                            )}
                          </div>
                        </td>
                      );
                    }else{
                      // GURU VIEW
                      const cg={ borderRight:'1px solid #1e1e2e', padding:'6px 5px', verticalAlign:'middle', position:'relative', width:'calc((100% - 75px)/7)', minWidth:0 };

                      // 1. Tampilkan Upacara untuk Guru juga! (Karena guru ikut upacara)
                      let isUpacaraGlobal = false;
                      for (const k of kelas) { if (jadwal[k.id]?.[hari]?.[i+1]?.isUpacara) { isUpacaraGlobal = true; break; } }
                      
                      if (isUpacaraGlobal) {
                          return <td key={hari} className="td-upacara" style={{...cg,background:'rgba(239,68,68,.08)',textAlign:'center'}}><span style={{fontSize:11,fontWeight:900,color:'#f87171',letterSpacing:1,fontFamily:'Exo 2'}}>UPACARA</span></td>;
                      }

                      let myTasks = [];
                      for(const k of kelas){
                          const cell = jadwal[k.id]?.[hari]?.[i+1];
                          if(cell && !cell.isUpacara && cell.guruId === id) {
                              myTasks.push({af: cell, kf: k.id});
                          }
                      }
                      
                      // BENTROK
                      if(myTasks.length > 1) {
                          return (
                              <td key={hari} style={{...cg, background:'rgba(239,68,68,.1)', borderLeft:'2px solid #f87171', textAlign:'center'}}>
                                  <div style={{color:'#f87171', fontSize:10, fontWeight:900, marginBottom:4, letterSpacing:1}}>BENTROK!</div>
                                  {myTasks.map((t, idx) => <div key={idx} style={{fontSize:9, color:'#fca5a5', marginBottom:2}}>{mName(t.af.mapelId)} ({kName(t.kf)})</div>)}
                              </td>
                          );
                      } 
                      // NORMAL MENGAJAR
                      else if(myTasks.length === 1) {
                          let af = myTasks[0].af; let kf = myTasks[0].kf;
                          return (
                            <td key={hari} className="td-guru-mapel jadwal-cell" style={{...cg,background:'rgba(0,184,212,.06)',cursor:'pointer',borderLeft:'2px solid rgba(0,184,212,.4)'}} onClick={()=>openEdit(kf,hari,i+1, id)}>
                              <div style={{overflow:'hidden'}}>
                                <div style={{fontSize:11,fontWeight:800,color:'#00b8d4',fontFamily:'Exo 2',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:3}}>{mName(af.mapelId)}</div>
                                <div style={{display:'inline-block',fontSize:9,color:'#888',padding:'1px 5px',borderRadius:4,border:'1px solid #2a2a3e',background:'#0d0d14',maxWidth:'100%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{kName(kf)}</div>
                              </div>
                              <div className="ca no-print">
                                  <button className="cbtn cbtn-e" onClick={e=>{e.stopPropagation();openEdit(kf,hari,i+1, id);}}><i className="fas fa-pen"/></button>
                                  <button className="cbtn cbtn-d" onClick={e=>{e.stopPropagation();delCell(kf,hari,i+1);}}><i className="fas fa-times"/></button>
                              </div>
                            </td>
                          );
                      } 
                      // TIDAK ADA MENGAJAR - CEK APAKAH KELAS-NYA SIBUK
                      else {
                          let occupiedMyClasses = [];
                          const myClasses = kelas.filter(k => assignments.some(a => a.guruId === id && a.kelasId === k.id));
                          
                          myClasses.forEach(k => {
                              const cell = jadwal[k.id]?.[hari]?.[i+1];
                              if (cell && (cell.guruId !== id || cell.isUpacara)) {
                                  occupiedMyClasses.push(k.nama);
                              }
                          });

                          if (myClasses.length > 0 && occupiedMyClasses.length === myClasses.length) {
                              return (
                                  <td key={hari} style={{...cg, background:'#151520', textAlign:'center', borderLeft:'2px solid #333', opacity:0.7}}>
                                      <div style={{fontSize:9, color:'#555', fontWeight:700, letterSpacing:0.5}}>KELAS PENUH</div>
                                  </td>
                              );
                          } else {
                              return (
                                  <td key={hari} className="td-empty jadwal-cell" style={{...cg,background:'#111118',cursor:'pointer',textAlign:'center'}} onClick={()=>{
                                      const fallbackKls = myClasses.find(k => !occupiedMyClasses.includes(k.nama));
                                      openEdit(fallbackKls?.id || kelas[0]?.id, hari, i+1, id);
                                  }}>
                                    <i className="fas fa-plus" style={{fontSize:11,color:'#333',display:'block'}}/>
                                  </td>
                              );
                          }
                      }
                    }
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  const selStyle={background:'#161622',border:'1px solid #333',borderRadius:8,padding:'7px 12px',fontSize:12,fontWeight:700,color:'#fff',outline:'none'};

  const activeRemainingMapels = getRemainingMapel(editCell?.isGuruView ? editData.selectedKelas : editCell?.kId);
  const selectedMapelDetail = activeRemainingMapels.find(a => a.mapelId === editData.mapelId);
  const maxDurasiFill = selectedMapelDetail ? selectedMapelDetail.remaining : 1;
  const availableConsecutive = getAvailableConsecutive();
  const maxDurasi = Math.min(maxDurasiFill, availableConsecutive);
  const isSingleSlotBlocked = availableConsecutive === 1 && editData.mapelId;
  const guruClassesList = editCell?.isGuruView ? kelas.filter(k => assignments.some(a => a.guruId === editData.guruId && a.kelasId === k.id)) : kelas;

  return(
    <div className="ain" style={{display:'flex',flexDirection:'column',height:'100%',gap:12}}>
      <ValidationPanel validationData={validationData} onGoToKelas={(kId)=>{setViewMode('kelas');setSelId(kId);}} />

      <div className="no-print" style={{display:'flex',flexWrap:'wrap',justifyContent:'space-between',alignItems:'center',gap:10,flexShrink:0}}>
        <div style={{display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
          <select value={viewMode} onChange={e=>{setViewMode(e.target.value);setSelId(e.target.value==='guru'?guru[0]?.id:kelas[0]?.id);}} style={selStyle}>
            <option value="semua_kelas">Semua Kelas</option>
            <option value="kelas">Pilih Kelas</option>
            <option value="guru">Jadwal Guru</option>
          </select>
          {viewMode==='kelas'&&<select value={selId} onChange={e=>setSelId(e.target.value)} style={selStyle}>{kelas.map(k=><option key={k.id} value={k.id}>{k.nama}</option>)}</select>}
          {viewMode==='guru'&&<select value={selId} onChange={e=>setSelId(e.target.value)} style={selStyle}>{guru.map(g=><option key={g.id} value={g.id}>{g.nama}</option>)}</select>}
          
          {viewMode==='semua_kelas'&&<button onClick={()=>setLockMode(!lockMode)} style={{background:lockMode?'rgba(245,158,11,.15)':'#161622',color:lockMode?'#fcd34d':'#aaa',border:`1px solid ${lockMode?'rgba(245,158,11,.4)':'#333'}`,borderRadius:8,padding:'7px 12px',fontSize:12,fontWeight:700,cursor:'pointer',marginLeft:8}}><i className={`fas ${lockMode?'fa-lock':'fa-unlock'}`} style={{marginRight:6}}/> Mode Lock Manual</button>}
          
          <button onClick={()=>{setLockGuruTarget(guru[0]?.id||'');setShowLockGuruModal(true);}} style={{background:'#161622',color:'#fbbf24',border:'1px solid rgba(245,158,11,.3)',borderRadius:8,padding:'7px 12px',fontSize:12,fontWeight:700,cursor:'pointer'}}><i className="fas fa-user-lock" style={{marginRight:6}}/>Lock Per Guru</button>
          
          <button onClick={()=>{setResetTarget([]);setResetMode('unlocked');setShowResetModal(true);}} style={{background:'#161622',color:'#f87171',border:'1px solid rgba(239,68,68,.3)',borderRadius:8,padding:'7px 12px',fontSize:12,fontWeight:700,cursor:'pointer'}}><i className="fas fa-trash-restore" style={{marginRight:6}}/>Reset Jadwal</button>
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          <button onClick={()=>{ window.print() }} className="btn-p" style={{padding:'8px 16px',borderRadius:8,fontSize:12}}><i className="fas fa-print" style={{marginRight:6}}/> Cetak PDF</button>
          <button onClick={doExcel} style={{background:'#161622',color:'#00e5a0',border:'1px solid rgba(0,229,160,.3)',borderRadius:8,padding:'8px 16px',fontSize:12,fontWeight:700,cursor:'pointer'}}><i className="fas fa-file-excel" style={{marginRight:6}}/> Excel (XLSX)</button>
        </div>
      </div>

      <div className="hs" style={{flex:1,background:'#0d0d14',borderRadius:12,padding:16,border:'1px solid #252535'}}>
        <div id="print-area">
          {viewMode==='semua_kelas'&&kelas.map(k=>renderTable(k.id,'kelas'))}
          {viewMode==='kelas'&&renderTable(selId,'kelas')}
          {viewMode==='guru'&&renderTable(selId,'guru')}
        </div>
      </div>

      {editCell&&(
        <div className="modal-bg">
          <div className="modal-box ain">
            <h3 style={{fontFamily:'Exo 2',fontWeight:900,fontSize:17,color:'#fff',marginBottom:18}}><i className="fas fa-pen" style={{color:'#00b8d4',marginRight:8}}/>Edit Slot Manual</h3>
            <div style={{display:'flex',gap:6,marginBottom:16,flexWrap:'wrap'}}>
              <span style={{padding:'3px 10px',borderRadius:6,border:'1px solid #333',background:'#0d0d14',color:'#aaa',fontSize:11}}>{editCell.hari} - JP {editCell.jp}</span>
              {!editCell.isGuruView && <span style={{padding:'3px 10px',borderRadius:6,fontSize:11,fontWeight:700}} className={`bg-gradient-to-r border ${kColor(kelas,editCell.kId)}`}>{kName(editCell.kId)}</span>}
              {availableConsecutive > 0 && (
                <span style={{padding:'3px 10px',borderRadius:6,fontSize:11,fontWeight:700,background:availableConsecutive===1?'rgba(239,68,68,.15)':'rgba(0,184,212,.1)',border:`1px solid ${availableConsecutive===1?'rgba(239,68,68,.4)':'rgba(0,184,212,.3)'}`,color:availableConsecutive===1?'#f87171':'#00b8d4'}}>
                  <i className="fas fa-layer-group" style={{marginRight:4}}/>{availableConsecutive} JP tersedia berurutan
                </span>
              )}
            </div>

            {availableConsecutive === 1 && (
              <div style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.35)',borderRadius:8,padding:'10px 12px',marginBottom:14,display:'flex',gap:8,alignItems:'center'}}>
                <i className="fas fa-ban" style={{color:'#f87171',fontSize:16}}/>
                <div>
                  <p style={{fontSize:12,fontWeight:700,color:'#f87171'}}>Slot ini tidak bisa diisi!</p>
                  <p style={{fontSize:11,color:'#fca5a5',marginTop:2}}>Hanya tersedia 1 JP berturutan. Memasukkan pelajaran di sini akan membuat blok pecahan (1 JP) yang dilarang oleh sistem. Pindah ke slot lain yang memiliki minimal 2 JP berurutan.</p>
                </div>
              </div>
            )}

            {editCell.isGuruView && (
                <div style={{marginBottom:12}}>
                    <label style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:2,display:'block',marginBottom:5}}>PILIH KELAS (Yang Diajar)</label>
                    <select value={editData.selectedKelas || ''} onChange={e=>setEditData({...editData, selectedKelas:e.target.value, mapelId:'', durasi:1})} style={{background:'#0d0d14',border:'1px solid #333',borderRadius:8,padding:'9px 12px',fontSize:13,color:'#fff',outline:'none',width:'100%'}}>
                        {guruClassesList.length===0 && <option value="">— Tidak ada tugas kelas (Kosong/Sibuk) —</option>}
                        {guruClassesList.map(k => <option key={k.id} value={k.id}>{k.nama}</option>)}
                    </select>
                </div>
            )}
            
            <div style={{marginBottom:12}}>
              <label style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:2,display:'block',marginBottom:5}}>MATA PELAJARAN (Tersedia)</label>
              <select value={editData.mapelId} onChange={e=>handleMapelChange(e.target.value)} disabled={availableConsecutive===1} style={{background:'#0d0d14',border:'1px solid #333',borderRadius:8,padding:'9px 12px',fontSize:13,color:'#fff',outline:'none',width:'100%',opacity:availableConsecutive===1?0.5:1}}>
                <option value="">— Kosongkan Slot —</option>
                {activeRemainingMapels.map(ass => (
                    <option key={ass.id} value={ass.mapelId}>{mName(ass.mapelId)} (Sisa: {ass.remaining} JP)</option>
                ))}
              </select>
            </div>

            {editData.mapelId && availableConsecutive > 1 && (
                <div style={{marginBottom:12, padding:'10px', background:'rgba(0,184,212,.05)', border:'1px solid rgba(0,184,212,.2)', borderRadius:8}}>
                  <label style={{fontSize:10,color:'#00b8d4',fontWeight:700,letterSpacing:1,display:'block',marginBottom:5}}>DURASI PENGISIAN (max {availableConsecutive} JP berurutan tersedia)</label>
                  <select value={editData.durasi} onChange={e=>setEditData({...editData, durasi:parseInt(e.target.value)})} style={{background:'#0d0d14',border:'1px solid #333',borderRadius:6,padding:'7px 10px',fontSize:12,color:'#fff',outline:'none',width:'100%'}}>
                    {[...Array(maxDurasi || 1)].map((_, idx) => (
                        <option key={idx+1} value={idx+1}>{idx+1} Jam Pelajaran (JP)</option>
                    ))}
                  </select>
                  {editData.durasi === 1 && maxDurasi > 1 && (
                      <p style={{fontSize:10, color:'#f87171', fontWeight:700, marginTop:6}}><i className="fas fa-exclamation-triangle"/> Peringatan: Memasukkan 1 JP berisiko menyisakan pecahan blok yang dilarang. Harap pilih 2 JP atau lebih jika memungkinkan.</p>
                  )}
                </div>
            )}
            
            <div style={{marginBottom:12}}>
              <label style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:2,display:'block',marginBottom:5}}>GURU PENGAJAR</label>
              <select value={editData.guruId} onChange={e=>setEditData({...editData, guruId:e.target.value})} style={{background:'#0d0d14',border:'1px solid #333',borderRadius:8,padding:'9px 12px',fontSize:13,color:'#fff',outline:'none',width:'100%'}} disabled={!editData.mapelId || editCell.isGuruView || availableConsecutive===1}>
                <option value="">— Tidak ada guru —</option>
                {guru.map(x=><option key={x.id} value={x.id}>{x.nama}</option>)}
              </select>
            </div>
            
            <div style={{display:'flex',gap:10,marginTop:20}}>
              <button onClick={()=>setEditCell(null)} style={{flex:1,padding:'10px',borderRadius:8,border:'1px solid #333',background:'#0d0d14',color:'#888',cursor:'pointer',fontSize:12,fontWeight:700}}>Batal</button>
              <button onClick={saveEdit} disabled={isSingleSlotBlocked} className="btn-p" style={{flex:1,padding:'10px',borderRadius:8,fontSize:12,opacity:isSingleSlotBlocked?0.4:1,cursor:isSingleSlotBlocked?'not-allowed':'pointer'}}>Simpan</button>
            </div>
          </div>
        </div>
      )}

      {showLockGuruModal&&(
        <div className="modal-bg">
          <div className="modal-box ain" style={{maxWidth:440}}>
            <h3 style={{fontFamily:'Exo 2',fontWeight:900,fontSize:17,color:'#fff',marginBottom:16}}><i className="fas fa-user-lock" style={{color:'#fbbf24',marginRight:8}}/>Kunci Jadwal Per Guru</h3>
            <p style={{fontSize:11,color:'#888',marginBottom:16,lineHeight:1.6}}>Pilih guru untuk dikunci semua slotnya. Slot terkunci tidak akan berubah saat auto generate. Slot hanya terbuka saat tombol Buka Kunci atau Reset Semua Jadwal.</p>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:10,color:'#555',fontWeight:700,letterSpacing:2,display:'block',marginBottom:6}}>PILIH GURU</label>
              <select value={lockGuruTarget} onChange={e=>setLockGuruTarget(e.target.value)} style={{background:'#0d0d14',border:'1px solid #333',borderRadius:8,padding:'9px 12px',fontSize:13,color:'#fff',outline:'none',width:'100%'}}>
                {guru.map(g=>{
                  let lockedCount=0;
                  kelas.forEach(k=>{HARI.forEach(h=>{for(let j=1;j<=JP_MAX;j++){if(jadwal[k.id]?.[h]?.[j]?.guruId===g.id&&lockedSlots?.[k.id]?.[h]?.[j])lockedCount++;}})});
                  return <option key={g.id} value={g.id}>{g.nama} {lockedCount>0?`(${lockedCount} terkunci)`:''}</option>;
                })}
              </select>
            </div>
            {lockGuruTarget&&(()=>{
              let total=0;let locked=0;
              kelas.forEach(k=>{HARI.forEach(h=>{for(let j=1;j<=JP_MAX;j++){if(jadwal[k.id]?.[h]?.[j]?.guruId===lockGuruTarget&&!jadwal[k.id][h][j].isUpacara){total++;if(lockedSlots?.[k.id]?.[h]?.[j])locked++;}}})});
              return <div style={{background:'#0d0d14',border:'1px solid #252535',borderRadius:8,padding:'10px 12px',marginBottom:14,fontSize:12}}>
                <span style={{color:'#aaa'}}>Total slot guru: </span><span style={{color:'#fff',fontWeight:700}}>{total} JP</span>
                <span style={{color:'#aaa',marginLeft:12}}>Sudah terkunci: </span><span style={{color:'#fbbf24',fontWeight:700}}>{locked} JP</span>
              </div>;
            })()}
            <div style={{display:'flex',gap:8,marginTop:4}}>
              <button onClick={()=>setShowLockGuruModal(false)} style={{flex:1,padding:'10px',borderRadius:8,border:'1px solid #333',background:'#0d0d14',color:'#888',cursor:'pointer',fontSize:12,fontWeight:700}}>Batal</button>
              <button onClick={()=>{unlockGuruSlots(lockGuruTarget);alert('Slot guru berhasil dibuka!');setShowLockGuruModal(false);}} style={{flex:1,padding:'10px',borderRadius:8,border:'1px solid rgba(239,68,68,.4)',background:'rgba(239,68,68,.1)',color:'#f87171',cursor:'pointer',fontSize:12,fontWeight:700}}><i className="fas fa-unlock" style={{marginRight:5}}/>Buka Kunci</button>
              <button onClick={()=>lockGuruSlots(lockGuruTarget)} style={{flex:1,padding:'10px',borderRadius:8,border:'none',background:'linear-gradient(135deg,#d97706,#b45309)',color:'#fff',cursor:'pointer',fontSize:12,fontWeight:700}}><i className="fas fa-lock" style={{marginRight:5}}/>Kunci Semua</button>
            </div>
          </div>
        </div>
      )}

      {showResetModal&&(
        <div className="modal-bg">
          <div className="modal-box ain" style={{maxWidth:520}}>
            <h3 style={{fontFamily:'Exo 2',fontWeight:900,fontSize:17,color:'#fff',marginBottom:8}}><i className="fas fa-trash-restore" style={{color:'#f87171',marginRight:8}}/>Reset / Hapus Jadwal</h3>
            <p style={{fontSize:11,color:'#888',marginBottom:16,lineHeight:1.6}}>Pilih jenis penghapusan. Tindakan ini tidak dapat dibatalkan (kecuali restore backup dari Dashboard).</p>
            
            <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
              {[
                {v:'unlocked',l:'Hapus Jadwal Tidak Terkunci',d:'Slot terkunci tetap aman. Hanya yang belum dikunci yang dihapus.',c:'#aaa'},
                {v:'all',l:'Hapus SEMUA Jadwal (Reset Total)',d:'Termasuk slot terkunci. Semua jadwal dihapus habis.',c:'#f87171'},
                {v:'guru',l:'Hapus Per Guru (tak terkunci)',d:'Pilih guru yang jadwalnya ingin dihapus.',c:'#fbbf24'},
                {v:'kelas',l:'Hapus Per Kelas (tak terkunci)',d:'Pilih kelas yang jadwalnya ingin dihapus.',c:'#a78bfa'},
              ].map(opt=>(
                <div key={opt.v} onClick={()=>{setResetMode(opt.v);setResetTarget([]);}} style={{cursor:'pointer',background:resetMode===opt.v?'rgba(239,68,68,.08)':'#0d0d14',border:`1px solid ${resetMode===opt.v?'rgba(239,68,68,.4)':'#252535'}`,borderRadius:8,padding:'10px 12px',display:'flex',gap:10,alignItems:'flex-start'}}>
                  <input type="radio" readOnly checked={resetMode===opt.v} style={{marginTop:2,accentColor:'#f87171'}}/>
                  <div><p style={{fontSize:12,fontWeight:700,color:opt.c}}>{opt.l}</p><p style={{fontSize:10,color:'#666',marginTop:2}}>{opt.d}</p></div>
                </div>
              ))}
            </div>

            {resetMode==='guru'&&(
              <div style={{marginBottom:14,background:'#0d0d14',border:'1px solid #252535',borderRadius:8,padding:'10px',maxHeight:160,overflowY:'auto'}}>
                <p style={{fontSize:10,color:'#fbbf24',fontWeight:700,marginBottom:8}}>Pilih guru yang akan dihapus jadwalnya:</p>
                {guru.map(g=>(
                  <label key={g.id} style={{display:'flex',gap:8,alignItems:'center',marginBottom:6,cursor:'pointer'}}>
                    <input type="checkbox" checked={resetTarget.includes(g.id)} onChange={e=>{if(e.target.checked)setResetTarget(p=>[...p,g.id]);else setResetTarget(p=>p.filter(x=>x!==g.id));}} style={{accentColor:'#fbbf24',width:14,height:14}}/>
                    <span style={{fontSize:12,color:resetTarget.includes(g.id)?'#fbbf24':'#ccc',fontWeight:resetTarget.includes(g.id)?700:400}}>{g.nama}</span>
                  </label>
                ))}
              </div>
            )}
            
            {resetMode==='kelas'&&(
              <div style={{marginBottom:14,background:'#0d0d14',border:'1px solid #252535',borderRadius:8,padding:'10px',maxHeight:180,overflowY:'auto'}}>
                <p style={{fontSize:10,color:'#a78bfa',fontWeight:700,marginBottom:8}}>Pilih kelas yang akan dihapus jadwalnya:</p>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                {kelas.map(k=>(
                  <label key={k.id} style={{display:'flex',gap:8,alignItems:'center',cursor:'pointer',background:resetTarget.includes(k.id)?'rgba(167,139,250,.1)':'transparent',border:`1px solid ${resetTarget.includes(k.id)?'rgba(167,139,250,.4)':'#252535'}`,borderRadius:6,padding:'6px 8px'}}>
                    <input type="checkbox" checked={resetTarget.includes(k.id)} onChange={e=>{if(e.target.checked)setResetTarget(p=>[...p,k.id]);else setResetTarget(p=>p.filter(x=>x!==k.id));}} style={{accentColor:'#a78bfa',width:13,height:13}}/>
                    <span style={{fontSize:11,color:resetTarget.includes(k.id)?'#a78bfa':'#ccc',fontWeight:resetTarget.includes(k.id)?700:400}}>{k.nama}</span>
                  </label>
                ))}
                </div>
              </div>
            )}

            {((resetMode==='guru'||resetMode==='kelas')&&resetTarget.length===0)&&(
              <p style={{fontSize:11,color:'#f87171',marginBottom:12}}><i className="fas fa-exclamation-triangle" style={{marginRight:5}}/>Pilih minimal satu {resetMode==='guru'?'guru':'kelas'}!</p>
            )}

            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setShowResetModal(false)} style={{flex:1,padding:'10px',borderRadius:8,border:'1px solid #333',background:'#0d0d14',color:'#888',cursor:'pointer',fontSize:12,fontWeight:700}}>Batal</button>
              <button onClick={doResetJadwal} disabled={(resetMode==='guru'||resetMode==='kelas')&&resetTarget.length===0} className="btn-d" style={{flex:2,padding:'10px',borderRadius:8,fontSize:12,fontWeight:700,cursor:'pointer'}}><i className="fas fa-trash-alt" style={{marginRight:6}}/>Hapus Jadwal Sekarang</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
});

// MAIN APP
const App = ()=>{
  const [tab,setTab]=useState('dashboard'); const [sidebar,setSidebar]=useState(false);

  const [akademik,setAkademik]=useState(()=>LS.get('akademik',{namaSekolah:'SD Negeri 1 Nusantara',tahunAjaran:'',semester:''}));
  const [kelas,setKelas]=useState(()=>LS.get('kelas',DEFAULT_KELAS));
  const [guru,setGuru]=useState(()=>LS.get('guru',DEFAULT_GURU));
  const [mapel,setMapel]=useState(()=>LS.get('mapel',DEFAULT_MAPEL));
  const [assignments,setAssignments]=useState(()=>LS.get('assignments',[]));
  const [guruOffDays,setGuruOffDays]=useState(()=>LS.get('guruOffDays',{}));
  const [slotConfig,setSlotConfig]=useState(()=>LS.get('slotConfig',null));
  const [jadwal,setJadwal]=useState(()=>LS.get('jadwal',{}));
  const [isGenerated,setIsGenerated]=useState(()=>LS.get('isGenerated',false));
  const [lockedSlots,setLockedSlots]=useState(()=>LS.get('lockedSlots',{}));
  const [history,setHistory]=useState(()=>LS.get('history',[]));

  useEffect(()=>{LS.set('akademik',akademik);},[akademik]);
  useEffect(()=>{LS.set('kelas',kelas);},[kelas]);
  useEffect(()=>{LS.set('guru',guru);},[guru]);
  useEffect(()=>{LS.set('mapel',mapel);},[mapel]);
  useEffect(()=>{LS.set('assignments',assignments);},[assignments]);
  useEffect(()=>{LS.set('guruOffDays',guruOffDays);},[guruOffDays]);
  useEffect(()=>{LS.set('slotConfig',slotConfig);},[slotConfig]);
  useEffect(()=>{LS.set('jadwal',jadwal);},[jadwal]);
  useEffect(()=>{LS.set('isGenerated',isGenerated);},[isGenerated]);
  useEffect(()=>{LS.set('lockedSlots',lockedSlots);},[lockedSlots]);
  useEffect(()=>{LS.set('history',history);},[history]); 

  useEffect(()=>{
    setSlotConfig(prev=>{
      let cfg=prev?{...prev}:{};let changed=false;
      Object.keys(cfg).forEach(kId=>{if(!kelas.find(k=>k.id===kId)){delete cfg[kId];changed=true;}});
      kelas.forEach(k=>{if(!cfg[k.id]){cfg[k.id]={};HARI.forEach(h=>{cfg[k.id][h]={};for(let j=1;j<=JP_MAX;j++)cfg[k.id][h][j]=h!=='Minggu';});changed=true;}});
      return changed||!prev?{...cfg}:prev;
    });
  },[kelas]);

  const MENUS=[
    {s:'UTAMA',items:[{id:'dashboard',i:'fa-chart-pie',l:'Dashboard'},{id:'akademik',i:'fa-university',l:'Identitas Akademik'},{id:'master',i:'fa-database',l:'Data Master'},{id:'tugas',i:'fa-tasks',l:'Tugas Mengajar'}]},
    {s:'KONFIGURASI',items:[{id:'slot',i:'fa-clock',l:'Pengaturan Jam'},{id:'ketersediaan',i:'fa-toggle-on',l:'Ketersediaan Jam'}]},
    {s:'EKSEKUSI',items:[{id:'generate',i:'fa-robot',l:'Auto Generate AI'},{id:'grid',i:'fa-calendar-alt',l:'Hasil & Cetak'}]},
  ];

  const sBase={background:'none',border:'1px solid transparent',borderRadius:8,padding:'9px 12px',fontSize:12,fontWeight:600,color:'#555',cursor:'pointer',display:'flex',alignItems:'center',width:'100%',transition:'all .15s'};
  const sActive={...sBase,background:'linear-gradient(135deg,rgba(0,229,160,.1),rgba(0,184,212,.06))',border:'1px solid rgba(0,229,160,.3)',color:'#00e5a0'};

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden',background:'#0d0d14'}}>
      <div className="no-print" style={{height:40,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',background:'#0a0a12',borderBottom:'1px solid #252535',flexShrink:0}}>
        <span style={{fontSize:10,color:'#00e5a0',fontFamily:'Exo 2',fontWeight:800}}>{akademik.namaSekolah.toUpperCase()}</span>
      </div>
      
      <div className="no-print" style={{background:'rgba(0,229,160,.05)', padding:'4px 0', borderBottom:'1px solid #252535'}}>
          <marquee scrollamount="5" style={{color:'#00e5a0', fontSize:12, fontWeight:700, fontFamily:'Exo 2', display:'block', marginTop:'2px'}}>
              🚀 SELAMAT DATANG DI SIMJAS PRO v3.7 - SISTEM MANAJEMEN JADWAL CERDAS | PASTIKAN SELALU BACKUP DATA ANDA DI MENU DASHBOARD 🚀
          </marquee>
      </div>

      <div style={{display:'flex',flex:1,overflow:'hidden',position:'relative'}}>
        {sidebar&&<div className="no-print" style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',zIndex:20}} onClick={()=>setSidebar(false)}/>}
        <div className="no-print" style={{position:'fixed',top:0,bottom:0,left:0,width:230,zIndex:30,background:'#0a0a12',borderRight:'1px solid #252535',display:'flex',flexDirection:'column',transform:sidebar?'translateX(0)':'translateX(-100%)',transition:'transform .28s'}}>
          <style>{`@media(min-width:768px){.sidebar-inner{transform:translateX(0)!important;}}`}</style>
          <div className="sidebar-inner" style={{position:'fixed',top:0,bottom:0,left:0,width:230,background:'#0a0a12',borderRight:'1px solid #252535',display:'flex',flexDirection:'column',transition:'transform .28s',transform:sidebar?'translateX(0)':'translateX(-100%)'}}>
            <div style={{padding:'14px 16px',borderBottom:'1px solid #252535',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <Logo/>
              <button onClick={()=>setSidebar(false)} style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:16}} className="md-hide">✕</button>
            </div>
            <nav className="hs" style={{flex:1,padding:'12px 10px'}}>
              {MENUS.map(sec=>(
                <div key={sec.s} style={{marginBottom:16}}>
                  <div style={{fontSize:9,fontWeight:800,color:'#333',letterSpacing:3,padding:'0 10px',marginBottom:8}}>{sec.s}</div>
                  {sec.items.map(m=>( <button key={m.id} onClick={()=>{setTab(m.id);setSidebar(false);}} style={tab===m.id?sActive:sBase}><i className={`fas ${m.i}`} style={{width:20,marginRight:8,fontSize:13,color:tab===m.id?'#00e5a0':'inherit'}}/>{m.l}</button> ))}
                </div>
              ))}
            </nav>
          </div>
        </div>
        <div className="no-print" style={{width:230,flexShrink:0,display:'none'}} id="sidebar-spacer"/><style>{`@media(min-width:768px){#sidebar-spacer{display:block!important;}}`}</style>
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'#0d0d14'}}>
          <div className="no-print" style={{display:'none',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:'#0a0a12',borderBottom:'1px solid #252535'}} id="mobile-header">
            <Logo small/><button onClick={()=>setSidebar(true)} style={{background:'none',border:'none',color:'#aaa',cursor:'pointer',fontSize:18}}>☰</button>
          </div><style>{`@media(max-width:767px){#mobile-header{display:flex!important;}}`}</style>
          <div className="hs" style={{flex:1,padding:'20px 20px 60px'}}>
            {tab==='dashboard'&&<Dashboard akademik={akademik} guru={guru} kelas={kelas} mapel={mapel} assignments={assignments} isGenerated={isGenerated} setTab={setTab}/>}
            {tab==='akademik'&&<PengaturanAkademik akademik={akademik} setAkademik={setAkademik}/>}
            {tab==='master'&&<MasterData kelas={kelas} setKelas={setKelas} guru={guru} setGuru={setGuru} mapel={mapel} setMapel={setMapel} assignments={assignments} setAssignments={setAssignments} guruOffDays={guruOffDays} setGuruOffDays={setGuruOffDays} jadwal={jadwal} />}
            {tab==='tugas'&&<TugasMengajar kelas={kelas} guru={guru} mapel={mapel} assignments={assignments} setAssignments={setAssignments}/>}
            {tab==='slot'&&<PengaturanJam kelas={kelas} setKelas={setKelas}/>}
            {tab==='ketersediaan'&&<Ketersediaan kelas={kelas} slotConfig={slotConfig} setSlotConfig={setSlotConfig}/>}
            
            {tab==='generate'&&<AutoGenerate akademik={akademik} kelas={kelas} guru={guru} mapel={mapel} assignments={assignments} slotConfig={slotConfig} guruOffDays={guruOffDays} setJadwal={setJadwal} setIsGenerated={setIsGenerated} setTab={setTab} lockedSlots={lockedSlots} jadwal={jadwal} history={history} setHistory={setHistory}/>}
            
            {tab==='grid'&&<GridJadwal akademik={akademik} kelas={kelas} guru={guru} mapel={mapel} jadwal={jadwal} assignments={assignments} slotConfig={slotConfig} isGenerated={isGenerated} setJadwal={setJadwal} lockedSlots={lockedSlots} setLockedSlots={setLockedSlots}/>}
          </div>
        </div>
      </div>
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
